<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Pet Are You?</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="text-center mb-4">What Pet Are You?</h1>

    <div class="question-block card p-3 mb-3" data-question="q1">
      <h2 class="h5">1. Which vacation spot do you prefer?</h2>
      <button class="btn btn-outline-primary answer-btn mb-2" data-points="1">Going to the beach</button>
      <button class="btn btn-outline-primary answer-btn" data-points="2">Going to the mountains</button>
    </div>

    <div class="question-block card p-3 mb-3" data-question="q2">
      <h2 class="h5">2. Pick a snack:</h2>
      <button class="btn btn-outline-primary answer-btn mb-2" data-points="1">Oreos</button>
      <button class="btn btn-outline-primary answer-btn" data-points="2">Doritos</button>
    </div>

    <div class="question-block card p-3 mb-3" data-question="q3">
      <h2 class="h5">3. Which describes you best?</h2>
      <button class="btn btn-outline-primary answer-btn mb-2" data-points="1">Early bird</button>
      <button class="btn btn-outline-primary answer-btn" data-points="2">Night owl</button>
    </div>

    <div class="text-center">
      <button id="result-btn" class="btn btn-success">Show me the results!</button>
    </div>

    <div id="result-container" class="mt-4 text-center fw-bold"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
